<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Yelling at the Cloud</title>
    <link rel="icon" type="image/jpeg" href="touchicon.jpg" />
    <link rel="apple-touch-icon" href="touchicon.jpg" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Bangers&family=Space+Mono&display=swap"
      rel="stylesheet"
    />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        min-height: 100vh;
        background: #1a1a2e;
        background-image:
          radial-gradient(
            ellipse at 20% 80%,
            rgba(255, 255, 255, 0.03) 0%,
            transparent 50%
          ),
          radial-gradient(
            ellipse at 80% 20%,
            rgba(255, 255, 255, 0.03) 0%,
            transparent 50%
          ),
          radial-gradient(
            ellipse at 50% 50%,
            rgba(254, 217, 15, 0.02) 0%,
            transparent 70%
          );
        font-family: "Space Mono", monospace;
        color: #f5f5f5;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 2rem;
      }

      .scene {
        position: relative;
        width: 100%;
        max-width: 900px;
        display: flex;
        flex-direction: column;
        align-items: center;
      }

      /* Service logos overlay - centered over the cloud in the SVG */
      .cloud-services {
        position: absolute;
        top: 12%;
        left: 27%;
        transform: translateX(-50%);
        display: flex;
        flex-wrap: nowrap;
        justify-content: center;
        align-items: center;
        gap: 12px;
        z-index: 10;
      }

      .service-logo {
        width: 32px;
        height: 32px;
        transition: transform 0.2s ease;
        animation: fadeIn 0.3s ease;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .service-logo:hover {
        transform: scale(1.2);
      }

      .service-logo svg {
        width: 100%;
        height: 100%;
        filter: drop-shadow(0 1px 2px rgba(0, 0, 0, 0.3));
      }

      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: scale(0.8);
        }
        to {
          opacity: 1;
          transform: scale(1);
        }
      }

      .abe-img {
        width: 100%;
        max-width: 800px;
        height: auto;
        object-fit: contain;
        display: none;
      }

      .state-angry .abe-angry {
        display: block;
      }

      .state-sleeping .abe-sleeping {
        display: block;
      }

      /* Status info */
      .status-info {
        margin-top: 1.5rem;
        text-align: center;
        font-size: 0.75rem;
        color: #666;
      }

      .status-message {
        font-size: 0.8rem;
        color: #888;
        margin-bottom: 0.4rem;
        min-height: 1.2em;
      }

      .status-message a {
        color: #a0a0a0;
        text-decoration: none;
        transition: color 0.2s;
      }

      .status-message a:hover {
        color: #fed90f;
        text-decoration: underline;
      }

      .state-sleeping .status-message {
        color: #5a9a6a;
      }

      .last-checked {
        font-size: 0.7rem;
        color: #555;
      }

      .healthy-services {
        font-size: 0.7rem;
        color: #555;
        margin-bottom: 0.3rem;
      }

      .healthy-services a {
        color: #666;
        text-decoration: none;
        transition: color 0.2s;
      }

      .healthy-services a:hover {
        color: #4ade80;
        text-decoration: underline;
      }

      .healthy-services a.service-down {
        color: #f87171;
      }

      .healthy-services a.service-down:hover {
        color: #fca5a5;
      }

      /* Loading state */
      .loading .status-message::after {
        content: "";
        animation: dots 1.5s infinite;
      }

      @keyframes dots {
        0%,
        20% {
          content: ".";
        }
        40% {
          content: "..";
        }
        60%,
        100% {
          content: "...";
        }
      }

      /* Error state */
      .error-message {
        color: #f87171;
        font-size: 0.9rem;
        margin-top: 1rem;
        text-align: center;
        max-width: 300px;
      }

      /* Hide service logos when sleeping */
      .state-sleeping .cloud-services {
        display: none;
      }

      /* Responsive sizing */
      @media (max-width: 600px) {
        .abe-img {
          max-width: 95vw;
        }
        .cloud-services {
          top: 3%;
          left: 26%;
          transform: translateX(-50%);
          width: 120px;
          height: 60px;
          gap: 8px;
        }
        .service-logo {
          width: 24px;
          height: 24px;
        }
      }
    </style>
  </head>
  <body>
    <div class="scene loading state-sleeping" id="scene">
      <!-- Service logos overlay (positioned over cloud in yelling.svg) -->
      <div class="cloud-services" id="cloudServices"></div>

      <!-- Abe Simpson - Angry pose -->
      <img
        class="abe-img abe-angry"
        src="yelling.svg"
        alt="Abe Simpson yelling at the cloud"
      />

      <!-- Abe Simpson - Sleeping pose -->
      <img
        class="abe-img abe-sleeping"
        src="asleep.svg"
        alt="Abe Simpson sleeping"
      />
    </div>

    <div class="status-info">
      <div class="healthy-services" id="healthyServices"></div>
      <div class="status-message" id="statusMessage">Checking services</div>
      <div class="last-checked" id="lastChecked"></div>
    </div>

    <script>
      // Inline SVG icons for each service (black on white)
      const ICONS = {

        aws: `<svg viewBox="0 0 24 24" fill="#000"><path d="M6.763 10.036c0 .296.032.535.088.71.064.176.144.368.256.576.04.063.056.127.056.183 0 .08-.048.16-.152.24l-.503.335a.383.383 0 0 1-.208.072c-.08 0-.16-.04-.239-.112a2.47 2.47 0 0 1-.287-.375 6.18 6.18 0 0 1-.248-.471c-.622.734-1.405 1.101-2.347 1.101-.67 0-1.205-.191-1.596-.574-.391-.384-.59-.894-.59-1.533 0-.678.239-1.23.726-1.644.487-.415 1.133-.623 1.955-.623.272 0 .551.024.846.064.296.04.6.104.918.176v-.583c0-.607-.127-1.03-.375-1.277-.255-.248-.686-.367-1.3-.367-.28 0-.568.031-.863.103-.295.072-.583.16-.862.272a2.287 2.287 0 0 1-.28.104.488.488 0 0 1-.127.023c-.112 0-.168-.08-.168-.247v-.391c0-.128.016-.224.056-.28a.597.597 0 0 1 .224-.167c.279-.144.614-.264 1.005-.36a4.84 4.84 0 0 1 1.246-.151c.95 0 1.644.216 2.091.647.439.43.662 1.085.662 1.963v2.586zm-3.24 1.214c.263 0 .534-.048.822-.144.287-.096.543-.271.758-.51.128-.152.224-.32.272-.512.047-.191.08-.423.08-.694v-.335a6.66 6.66 0 0 0-.735-.136 6.02 6.02 0 0 0-.75-.048c-.535 0-.926.104-1.19.32-.263.215-.39.518-.39.917 0 .375.095.655.295.846.191.2.47.296.838.296zm6.41.862c-.144 0-.24-.024-.304-.08-.064-.048-.12-.16-.168-.311L7.586 5.55a1.398 1.398 0 0 1-.072-.32c0-.128.064-.2.191-.2h.783c.151 0 .255.025.31.08.065.048.113.16.16.312l1.342 5.284 1.245-5.284c.04-.16.088-.264.151-.312a.549.549 0 0 1 .32-.08h.638c.152 0 .256.025.32.08.063.048.12.16.151.312l1.261 5.348 1.381-5.348c.048-.16.104-.264.16-.312a.52.52 0 0 1 .311-.08h.743c.127 0 .2.065.2.2 0 .04-.009.08-.017.128a1.137 1.137 0 0 1-.056.2l-1.923 6.17c-.048.16-.104.263-.168.311a.51.51 0 0 1-.303.08h-.687c-.151 0-.255-.024-.32-.08-.063-.056-.119-.16-.15-.32l-1.238-5.148-1.23 5.14c-.04.16-.087.264-.15.32-.065.056-.177.08-.32.08zm10.256.215c-.415 0-.83-.048-1.229-.143-.399-.096-.71-.2-.918-.32-.128-.071-.215-.151-.247-.223a.563.563 0 0 1-.048-.224v-.407c0-.167.064-.247.183-.247.048 0 .096.008.144.024.048.016.12.048.2.08.271.12.566.215.878.279.319.064.63.096.95.096.502 0 .894-.088 1.165-.264a.86.86 0 0 0 .415-.758.777.777 0 0 0-.215-.559c-.144-.151-.415-.287-.806-.415l-1.157-.36c-.583-.183-1.014-.454-1.277-.813a1.902 1.902 0 0 1-.4-1.158c0-.335.073-.63.216-.886.144-.255.335-.479.575-.654.24-.184.51-.32.83-.415.32-.096.655-.136 1.006-.136.175 0 .359.008.535.032.183.024.35.056.518.088.16.04.312.08.455.127.144.048.256.096.336.144a.69.69 0 0 1 .24.2.43.43 0 0 1 .071.263v.375c0 .168-.064.256-.184.256a.83.83 0 0 1-.303-.096 3.652 3.652 0 0 0-1.532-.311c-.455 0-.815.071-1.062.223-.248.152-.375.383-.375.71 0 .224.08.416.24.567.159.152.454.304.877.44l1.134.358c.574.184.99.44 1.237.767.247.327.367.702.367 1.117 0 .343-.072.655-.207.926-.144.272-.336.511-.583.703-.248.2-.543.343-.886.447-.36.111-.734.167-1.142.167zM21.698 16.207c-2.626 1.94-6.442 2.969-9.722 2.969-4.598 0-8.74-1.7-11.87-4.526-.247-.223-.024-.527.27-.351 3.384 1.963 7.559 3.153 11.877 3.153 2.914 0 6.114-.607 9.06-1.852.439-.2.814.287.385.607zM22.792 14.961c-.336-.43-2.22-.207-3.074-.103-.255.032-.295-.192-.063-.36 1.5-1.053 3.967-.75 4.254-.399.287.36-.08 2.826-1.485 4.007-.215.184-.423.088-.327-.151.32-.79 1.03-2.57.695-2.994z"/></svg>`,
      };

      const SERVICES = [
        {
          id: "anthropic",
          name: "Anthropic",
          type: "statuspage",
          url: "https://status.anthropic.com/api/v2/summary.json",
          statusPageUrl: "https://status.anthropic.com",
          useProxy: true,
        },
        {
          id: "aws",
          name: "AWS",
          type: "rss",
          url: "https://status.aws.amazon.com/rss/all.rss",
          statusPageUrl: "https://health.aws.amazon.com/health/status",
        },
        {
          id: "cloudflare",
          name: "Cloudflare",
          type: "statuspage",
          url: "https://www.cloudflarestatus.com/api/v2/summary.json",
          statusPageUrl: "https://www.cloudflarestatus.com",
        },
        {
          id: "github",
          name: "GitHub",
          type: "statuspage",
          url: "https://www.githubstatus.com/api/v2/summary.json",
          statusPageUrl: "https://www.githubstatus.com",
        },
        {
          id: "openai",
          name: "OpenAI",
          type: "statuspage",
          url: "https://status.openai.com/api/v2/summary.json",
          statusPageUrl: "https://status.openai.com",
        },
      ];

      let lastCheckTime = null;
      let checkInterval = null;
      let timerInterval = null;

      // Fetch status for a statuspage-based service
      async function fetchStatuspageStatus(service) {
        try {
          let url = service.url;
          if (service.useProxy) {
            url =
              "https://api.allorigins.win/get?url=" +
              encodeURIComponent(service.url);
          }
          const res = await fetch(url);
          if (!res.ok) throw new Error(`HTTP ${res.status}`);
          let data = await res.json();
          if (service.useProxy) {
            data = JSON.parse(data.contents);
          }

          const issues = data.components.filter(
            (c) => c.status !== "operational",
          );
          const hasIssues =
            issues.length > 0 || (data.incidents && data.incidents.length > 0);

          let statusText = "Operational";
          if (hasIssues) {
            if (data.incidents && data.incidents.length > 0) {
              statusText = data.incidents[0].name;
            } else if (issues.length > 0) {
              statusText = `${issues[0].name}: ${issues[0].status.replace("_", " ")}`;
            }
          }

          return {
            ...service,
            status: hasIssues ? "down" : "operational",
            statusText,
          };
        } catch (e) {
          return {
            ...service,
            status: "unknown",
            statusText: "Unable to fetch status",
          };
        }
      }

      // Fetch AWS status via RSS proxy
      async function fetchAWSStatus(service) {
        try {
          const proxyUrl =
            "https://api.allorigins.win/get?url=" +
            encodeURIComponent(service.url);
          const res = await fetch(proxyUrl);
          if (!res.ok) throw new Error(`HTTP ${res.status}`);

          const json = await res.json();
          let contents = json.contents;

          // Check if we got valid content
          if (!contents || contents.includes("404") || contents.includes("Not Found")) {
            throw new Error("RSS feed not available");
          }

          // Handle base64-encoded content from proxy
          if (contents.startsWith("data:")) {
            const base64Match = contents.match(/base64,(.+)/);
            if (base64Match) {
              contents = atob(base64Match[1]);
            }
          }

          const xml = new DOMParser().parseFromString(contents, "application/xml");

          // Check for parse errors
          const parseError = xml.querySelector("parsererror");
          if (parseError) {
            console.error("AWS RSS parse error, content:", contents.slice(0, 200));
            throw new Error("Invalid XML");
          }

          const items = [...xml.querySelectorAll("item")];

          // Look for unresolved issues - check title patterns
          const activeIssues = items.filter((item) => {
            const title = item.querySelector("title");
            const titleText = title?.textContent || "";

            // Skip resolved issues
            if (titleText.includes("[RESOLVED]") ||
                titleText.toLowerCase().includes("resolved") ||
                titleText.includes("operating normally")) {
              return false;
            }

            // Look for indicators of active issues
            return titleText.includes("Service disruption") ||
                   titleText.includes("Service impact") ||
                   titleText.includes("Informational message") ||
                   titleText.includes("Performance issues");
          });


          const hasIssues = activeIssues.length > 0;
          let statusText = "Operational";

          if (hasIssues && activeIssues[0]) {
            const title = activeIssues[0].querySelector("title");
            statusText = title
              ? title.textContent.slice(0, 60)
              : "Issues detected";
          }

          return {
            ...service,
            status: hasIssues ? "down" : "operational",
            statusText,
          };
        } catch (e) {
          console.error("AWS status fetch error:", e);
          return {
            ...service,
            status: "unknown",
            statusText: "Unable to fetch status",
          };
        }
      }

      // Fetch GCP status
      async function fetchGCPStatus(service) {
        try {
          const proxyUrl =
            "https://api.allorigins.win/get?url=" +
            encodeURIComponent(service.url);
          const res = await fetch(proxyUrl);
          if (!res.ok) throw new Error(`HTTP ${res.status}`);

          const { contents } = await res.json();
          const data = JSON.parse(contents);

          // Check for ongoing incidents (not resolved)
          const ongoing = data.filter(
            (incident) => !incident.end && incident.most_recent_update,
          );

          const hasIssues = ongoing.length > 0;
          let statusText = "Operational";

          if (hasIssues && ongoing[0]) {
            statusText =
              ongoing[0].external_desc?.slice(0, 50) || "Issues detected";
          }

          return {
            ...service,
            status: hasIssues ? "down" : "operational",
            statusText,
          };
        } catch (e) {
          return {
            ...service,
            status: "unknown",
            statusText: "Unable to fetch status",
          };
        }
      }

      // Fetch Azure status via RSS proxy
      async function fetchAzureStatus(service) {
        try {
          const proxyUrl =
            "https://api.allorigins.win/get?url=" +
            encodeURIComponent(service.url);
          const res = await fetch(proxyUrl);
          if (!res.ok) throw new Error(`HTTP ${res.status}`);

          const json = await res.json();
          let contents = json.contents;

          // Handle base64-encoded content
          if (contents.startsWith("data:")) {
            const base64Match = contents.match(/base64,(.+)/);
            if (base64Match) {
              contents = atob(base64Match[1]);
            }
          }

          const xml = new DOMParser().parseFromString(contents, "application/xml");
          const items = [...xml.querySelectorAll("item")];

          // Look for active issues (not resolved)
          const activeIssues = items.filter((item) => {
            const title = item.querySelector("title");
            const titleText = title?.textContent || "";
            // Skip resolved items
            if (titleText.toLowerCase().includes("resolved") ||
                titleText.toLowerCase().includes("mitigated")) {
              return false;
            }
            return titleText.toLowerCase().includes("issue") ||
                   titleText.toLowerCase().includes("degraded") ||
                   titleText.toLowerCase().includes("outage");
          });

          const hasIssues = activeIssues.length > 0;
          let statusText = "Operational";

          if (hasIssues && activeIssues[0]) {
            const title = activeIssues[0].querySelector("title");
            statusText = title ? title.textContent.slice(0, 60) : "Issues detected";
          }

          return {
            ...service,
            status: hasIssues ? "down" : "operational",
            statusText,
          };
        } catch (e) {
          return {
            ...service,
            status: "unknown",
            statusText: "Unable to fetch status",
          };
        }
      }

      // Get the fetch function for a service
      function fetchServiceStatus(service) {
        if (service.type === "statuspage") {
          return fetchStatuspageStatus(service);
        } else if (service.type === "rss") {
          return fetchAWSStatus(service);
        } else if (service.type === "gcp") {
          return fetchGCPStatus(service);
        } else if (service.type === "azure") {
          return fetchAzureStatus(service);
        }
        // Unknown type - return immediately
        return Promise.resolve({
          ...service,
          status: "unknown",
          statusText: "Check status page",
        });
      }

      // Current results state
      let currentResults = [];

      // Update the UI
      function updateUI(results) {
        const scene = document.getElementById("scene");
        const cloudServices = document.getElementById("cloudServices");
        const statusMessage = document.getElementById("statusMessage");
        const healthyServices = document.getElementById("healthyServices");

        scene.classList.remove("loading");

        const downServices = results.filter((s) => s.status === "down");
        const operationalServices = results.filter(
          (s) => s.status === "operational",
        );
        const unknownServices = results.filter((s) => s.status === "unknown");
        const allFailed =
          results.length > 0 && results.every((s) => s.status === "unknown");
        const stillChecking = results.length < SERVICES.length;

        // Clear cloud services
        cloudServices.innerHTML = "";

        // Build combined service list with warning indicators for down services
        const allServiceLinks = [];

        // Add down services first (red with warning emoji)
        downServices.forEach((s) => {
          allServiceLinks.push(
            `<a href="${s.statusPageUrl}" target="_blank" class="service-down" title="${s.statusText}">⚠️ ${s.name}</a>`,
          );
        });

        // Add operational services (normal style)
        operationalServices.forEach((s) => {
          allServiceLinks.push(
            `<a href="${s.statusPageUrl}" target="_blank">${s.name}</a>`,
          );
        });

        // Add unknown services (normal style)
        unknownServices.forEach((s) => {
          allServiceLinks.push(
            `<a href="${s.statusPageUrl}" target="_blank">${s.name}</a>`,
          );
        });

        if (allServiceLinks.length > 0) {
          healthyServices.innerHTML = allServiceLinks.join(" · ");
        } else {
          healthyServices.innerHTML = "";
        }

        if (allFailed) {
          scene.classList.remove("state-angry", "state-sleeping");
          scene.classList.add("state-sleeping");
          statusMessage.textContent =
            "Even the status pages are down. Abe is unreachable.";
          statusMessage.style.color = "#f87171";
          return;
        }

        if (downServices.length > 0) {
          scene.classList.remove("state-sleeping");
          scene.classList.add("state-angry");

          // Add service logos to cloud
          downServices.forEach((service) => {
            const link = document.createElement("a");
            link.href = service.statusPageUrl;
            link.target = "_blank";
            link.className = "service-logo";
            link.title = `${service.name}: ${service.statusText}`;
            link.innerHTML = ICONS[service.id] || service.name.slice(0, 2);
            cloudServices.appendChild(link);
          });
        } else {
          scene.classList.remove("state-angry");
          scene.classList.add("state-sleeping");
        }

        // Status message
        if (stillChecking) {
          const remaining = SERVICES.length - results.length;
          statusMessage.textContent = `Checking ${remaining} more service${remaining !== 1 ? "s" : ""}...`;
          statusMessage.style.color = "#888";
        } else if (downServices.length > 0) {
          statusMessage.textContent = "";
        } else {
          statusMessage.textContent = "All services operational";
          statusMessage.style.color = "#4ade80";
        }
      }

      // Update the "last checked" timer
      function updateTimer() {
        if (!lastCheckTime) return;

        const seconds = Math.floor((Date.now() - lastCheckTime) / 1000);
        const lastChecked = document.getElementById("lastChecked");

        if (seconds < 60) {
          lastChecked.textContent = `Last checked: ${seconds} second${seconds !== 1 ? "s" : ""} ago`;
        } else {
          const minutes = Math.floor(seconds / 60);
          lastChecked.textContent = `Last checked: ${minutes} minute${minutes !== 1 ? "s" : ""} ago`;
        }
      }

      // Main check function - streams results as they arrive
      async function checkStatuses() {
        // TEMPORARY: Force all services to appear down for visual testing
        const DEBUG_ALL_DOWN = false; // Set to true to simulate all services down

        // Initialize with pending state
        currentResults = SERVICES.map((s) => ({
          ...s,
          status: "pending",
          statusText: "Checking...",
        }));

        // Start all fetches and update UI as each completes
        const promises = SERVICES.map(async (service, index) => {
          try {
            let result = await fetchServiceStatus(service);
            if (DEBUG_ALL_DOWN) {
              result = {
                ...result,
                status: "down",
                statusText: "Testing mode",
              };
            }
            currentResults[index] = result;
            updateUI(currentResults.filter((r) => r.status !== "pending"));
          } catch (e) {
            currentResults[index] = {
              ...service,
              status: "unknown",
              statusText: "Error",
            };
            updateUI(currentResults.filter((r) => r.status !== "pending"));
          }
        });

        await Promise.all(promises);
        lastCheckTime = Date.now();
        updateTimer();

        // Log service statuses to console
        logServiceStatuses();
      }

      // Log service statuses to console
      function logServiceStatuses() {
        console.group("🌩️ Service Status Report");
        currentResults.forEach((service) => {
          if (service.status === "down") {
            console.log(`❌ ${service.name}: ${service.statusText}`);
          } else if (service.status === "operational") {
            console.log(`✅ ${service.name}: No issues detected`);
          } else {
            console.log(`❓ ${service.name}: Status unknown - ${service.statusText}`);
          }
        });
        console.groupEnd();
      }

      // Initialize
      async function init() {
        console.log("%c☁️ Yelling at the Cloud", "font-size: 16px; font-weight: bold;");
        console.log("%cVibe coded for fun by Art https://github.com/artkay", "color: #888;");

        await checkStatuses();

        // Poll every 60 seconds
        checkInterval = setInterval(checkStatuses, 60000);

        // Update timer every second
        timerInterval = setInterval(updateTimer, 1000);
      }

      init();
    </script>
  </body>
</html>
